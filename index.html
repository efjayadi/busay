<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusayBook ʕ•ᴥ•ʔ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <!-- Tenor Embed Script -->
    <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    <style>
        :root {
            --primary: #ffb7b2;
            --accent: #ff9aa2;
            --bg-app: #ffffff;
            --text-main: #4a3728;
            --kindle-bg: #f5f5f5;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-app);
            font-family: 'Quicksand', sans-serif;
            touch-action: none;
            color: var(--text-main);
        }

        /* MOTION DOTS - Top Layer */
        #motion-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50; 
        }

        /* Kindle Reader Container */
        #reader-container {
            position: fixed;
            inset: 0;
            display: none;
            background: var(--kindle-bg);
            z-index: 10;
        }

        #page-view {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #page-canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            background: white;
        }

        /* Kindle HUD (Heads Up Display) */
        .hud-element {
            position: fixed;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            z-index: 60;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 16px 24px;
        }

        #hud-top {
            top: 0;
            transform: translateY(-100%);
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #hud-bottom {
            bottom: 0;
            transform: translateY(100%);
            border-top: 1px solid #eee;
        }

        .hud-active #hud-top,
        .hud-active #hud-bottom {
            transform: translateY(0);
        }

        /* Settings Sheet - Bubu Style */
        .settings-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 32px 32px 0 0;
            padding: 32px 24px;
            z-index: 70;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.1);
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            border-top: 6px solid var(--primary);
        }

        .settings-sheet.open {
            transform: translateY(0);
        }

        /* Splash/Permission Screen */
        .permission-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .gif-wrapper {
            width: 220px;
            min-height: 220px;
            margin-bottom: 10px;
            pointer-events: none;
            background-color: #ffffff !important;
        }

        .tenor-gif-embed, .tenor-gif-embed iframe {
            background-color: #ffffff !important;
        }

        .bubbly-btn {
            background: var(--primary);
            color: white;
            font-weight: bold;
            padding: 16px 40px;
            border-radius: 30px;
            box-shadow: 0 8px 0 #ff938a;
            transition: all 0.1s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .bubbly-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #ff938a;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        input[type="range"] {
            width: 100%;
            height: 10px;
            background: #fdf2f2;
            border-radius: 10px;
            appearance: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
        }

        .tap-zone {
            position: fixed;
            top: 15%;
            bottom: 15%;
            width: 25%;
            z-index: 55;
        }

        #tap-center {
            position: fixed;
            top: 20%;
            bottom: 20%;
            left: 30%;
            right: 30%;
            z-index: 56;
        }
    </style>
</head>
<body class="hud-active">

    <div id="loading-overlay">
        <div class="animate-bounce mb-4 text-6xl">ʕ•ᴥ•ʔ</div>
        <p class="font-bold text-pink-400">Bubu is turning the pages...</p>
    </div>

    <canvas id="motion-canvas"></canvas>

    <!-- Start Screen -->
    <div id="permission-screen" class="permission-screen">
        <div class="gif-wrapper">
            <div class="tenor-gif-embed" data-postid="25251841" data-share-method="host" data-aspect-ratio="1" data-width="100%">
                <a href="https://tenor.com/view/tkthao219-bubududu-peach-goma-gif-25251841">Tkthao219 Bubududu Sticker</a>
            </div>
        </div>
        
        <h1 class="text-4xl font-bold mb-2 text-[#4a3728]" style="font-family: 'Gaegu', cursive;">BusayBook</h1>
        <p class="text-slate-500 mb-8 max-w-xs font-medium">Kindle-style reading, nausea-free! 🐾</p>
        
        <label for="pdf-upload" class="bubbly-btn text-xl cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            OPEN BOOK
        </label>
        <input type="file" id="pdf-upload" accept="application/pdf" class="hidden">
    </div>

    <!-- Kindle Reader UI -->
    <div id="reader-container">
        <!-- Reader Bars -->
        <div id="hud-top" class="hud-element">
            <button onclick="location.reload()" class="text-[#4a3728]">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="text-center">
                <div id="book-title" class="font-bold text-sm truncate max-w-[200px]">Busay Reading...</div>
                <div id="page-indicator" class="text-[10px] text-slate-400 uppercase tracking-widest">Page 0 of 0</div>
            </div>
            <button onclick="toggleSettings()" class="text-[#ff9aa2]">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
        </div>

        <div id="hud-bottom" class="hud-element">
            <div class="flex items-center gap-4">
                <span class="text-xs font-bold text-slate-400">0%</span>
                <div class="flex-grow h-1 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-pink-300 transition-all duration-300" style="width: 0%"></div>
                </div>
                <span id="progress-text" class="text-xs font-bold text-slate-400">0%</span>
            </div>
        </div>

        <!-- Kindle Navigation Zones -->
        <div id="tap-left" class="tap-zone left-0" onclick="prevPage()"></div>
        <div id="tap-right" class="tap-zone right-0" onclick="nextPage()"></div>
        <div id="tap-center" onclick="toggleHUD()"></div>

        <div id="page-view">
            <canvas id="page-canvas"></canvas>
        </div>
    </div>

    <!-- Busay Settings Sheet -->
    <div id="settings-sheet" class="settings-sheet">
        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8" onclick="toggleSettings()"></div>
        
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-xl font-bold" style="font-family: 'Gaegu';">Bubu's Settings</h2>
            <button id="mode-toggle" class="bg-pink-50 text-pink-500 px-4 py-2 rounded-full text-xs font-bold border-2 border-pink-200 uppercase tracking-widest">Heart Grid</button>
        </div>

        <div class="space-y-10">
            <div>
                <div class="flex justify-between text-sm mb-4">
                    <span class="font-bold text-slate-500">Stability Sensitivity</span>
                    <span id="sense-val" class="text-pink-400 font-bold">1.5x</span>
                </div>
                <input type="range" id="sensitivity" min="0.5" max="5" step="0.1" value="1.5">
            </div>

            <div>
                <div class="flex justify-between text-sm mb-4">
                    <span class="font-bold text-slate-500">Horizon Opacity</span>
                    <span id="opacity-val" class="text-pink-400 font-bold">40%</span>
                </div>
                <input type="range" id="opacity" min="0.1" max="0.9" step="0.1" value="0.4">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-50 p-4 rounded-2xl">
                    <span class="text-[10px] uppercase font-bold text-slate-400 block mb-2">Display Mode</span>
                    <button class="w-full text-sm font-bold py-2 bg-white rounded-lg shadow-sm">Paper White</button>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl">
                    <span class="text-[10px] uppercase font-bold text-slate-400 block mb-2">Motion Type</span>
                    <button id="motion-type-btn" class="w-full text-sm font-bold py-2 bg-white rounded-lg shadow-sm">Smooth Flow</button>
                </div>
            </div>
        </div>
        
        <button onclick="toggleSettings()" class="w-full mt-10 py-4 bg-pink-400 text-white font-bold rounded-2xl shadow-lg">DONE ʕ•ᴥ•ʔ</button>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const canvas = document.getElementById('motion-canvas');
        const ctx = canvas.getContext('2d');
        const pageCanvas = document.getElementById('page-canvas');
        const pageCtx = pageCanvas.getContext('2d');
        
        let pdfDoc = null;
        let state = {
            active: false,
            sensitivity: 1.5,
            dotSize: 8,
            opacity: 0.4,
            mode: 'dots',
            targetX: 0,
            targetY: 0,
            currentX: 0,
            currentY: 0,
            lerpFactor: 0.08, 
            currentPage: 1,
            totalPages: 0,
            hudVisible: true
        };

        // Swipe & Gesture Logic
        let touchStartX = 0;
        window.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, { passive: true });
        window.addEventListener('touchend', e => {
            const touchEndX = e.changedTouches[0].screenX;
            const threshold = 60;
            if (touchEndX < touchStartX - threshold) nextPage();
            else if (touchEndX > touchStartX + threshold) prevPage();
        }, { passive: true });

        async function handlePdfUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('loading-overlay').style.display = 'flex';
            document.getElementById('book-title').innerText = file.name.replace('.pdf', '');
            
            try {
                const arrayBuffer = await file.arrayBuffer();
                pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                state.totalPages = pdfDoc.numPages;
                renderPage(state.currentPage);
                startApp();
            } catch (err) {
                console.error("PDF Error:", err);
            } finally {
                document.getElementById('loading-overlay').style.display = 'none';
            }
        }

        async function renderPage(num) {
            if (!pdfDoc) return;
            const page = await pdfDoc.getPage(num);
            
            // Adjust scale to screen width
            const viewport = page.getViewport({ scale: 1.5 });
            const screenWidth = window.innerWidth * 0.95;
            const scale = screenWidth / viewport.width;
            const scaledViewport = page.getViewport({ scale: scale * 1.5 });

            pageCanvas.height = scaledViewport.height;
            pageCanvas.width = scaledViewport.width;

            await page.render({ 
                canvasContext: pageCtx, 
                viewport: scaledViewport 
            }).promise;

            updateHUD();
        }

        function updateHUD() {
            document.getElementById('page-indicator').innerText = `Page ${state.currentPage} of ${state.totalPages}`;
            const pct = Math.round((state.currentPage / state.totalPages) * 100);
            document.getElementById('progress-bar').style.width = `${pct}%`;
            document.getElementById('progress-text').innerText = `${pct}%`;
        }

        function toggleHUD() {
            state.hudVisible = !state.hudVisible;
            document.body.classList.toggle('hud-active', state.hudVisible);
        }

        function toggleSettings() {
            document.getElementById('settings-sheet').classList.toggle('open');
        }

        function nextPage() {
            if (state.currentPage < state.totalPages) {
                state.currentPage++;
                renderPage(state.currentPage);
            }
        }

        function prevPage() {
            if (state.currentPage > 1) {
                state.currentPage--;
                renderPage(state.currentPage);
            }
        }

        function startApp() {
            const init = () => {
                state.active = true;
                document.getElementById('permission-screen').style.display = 'none';
                document.getElementById('reader-container').style.display = 'block';
                
                window.addEventListener('devicemotion', (event) => {
                    const rawX = event.accelerationIncludingGravity ? event.accelerationIncludingGravity.x : 0;
                    const rawY = event.accelerationIncludingGravity ? event.accelerationIncludingGravity.y : 0;
                    state.targetX = -rawX * 50 * state.sensitivity;
                    state.targetY = rawY * 50 * state.sensitivity;
                });

                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                update();
            };

            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(res => res === 'granted' && init());
            } else init();
        }

        function update() {
            state.currentX += (state.targetX - state.currentX) * state.lerpFactor;
            state.currentY += (state.targetY - state.currentY) * state.lerpFactor;
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = `rgba(255, 183, 178, ${state.opacity})`;
            
            const spacing = 80;
            const w = canvas.width;
            const h = canvas.height;

            if (state.mode === 'dots') {
                for (let x = -spacing; x < w + spacing; x += spacing) {
                    for (let y = -spacing; y < h + spacing; y += spacing) {
                        let dx = (x + state.currentX) % (w + spacing);
                        let dy = (y + state.currentY) % (h + spacing);
                        if (dx < 0) dx += (w + spacing);
                        if (dy < 0) dy += (h + spacing);
                        ctx.beginPath();
                        ctx.arc(dx, dy, state.dotSize / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            } else {
                ctx.font = `${state.dotSize * 2.5}px serif`;
                for (let x = -spacing; x < w + spacing; x += spacing) {
                    for (let y = -spacing; y < h + spacing; y += spacing) {
                        let dx = (x + state.currentX) % (w + spacing);
                        let dy = (y + state.currentY) % (h + spacing);
                        if (dx < 0) dx += (w + spacing);
                        if (dy < 0) dy += (h + spacing);
                        ctx.fillText('❤', dx - state.dotSize, dy + state.dotSize);
                    }
                }
            }
        }

        // Controls
        document.getElementById('pdf-upload').addEventListener('change', handlePdfUpload);
        document.getElementById('sensitivity').oninput = (e) => {
            state.sensitivity = parseFloat(e.target.value);
            document.getElementById('sense-val').innerText = state.sensitivity.toFixed(1) + 'x';
        };
        document.getElementById('opacity').oninput = (e) => {
            state.opacity = parseFloat(e.target.value);
            document.getElementById('opacity-val').innerText = Math.round(state.opacity * 100) + '%';
        };
        document.getElementById('mode-toggle').onclick = (e) => {
            state.mode = state.mode === 'dots' ? 'hearts' : 'dots';
            e.target.innerText = state.mode === 'dots' ? 'Heart Grid' : 'Dot Mode';
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            renderPage(state.currentPage);
        });
    </script>
</body>
</html>
