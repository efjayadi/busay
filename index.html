<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KineRelief - PDF Flip Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Georgia', serif;
            touch-action: none;
            color: white;
        }

        #motion-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 3D Book Styles */
        .book-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            height: 70vh;
            max-width: 400px;
            perspective: 1500px;
            z-index: 10;
        }

        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(255, 255, 255, 0.92);
            color: #1e293b;
            padding: 30px;
            box-sizing: border-box;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.645, 0.045, 0.355, 1);
            border-radius: 0 10px 10px 0;
            box-shadow: inset 3px 0 10px rgba(0,0,0,0.1), 5px 5px 15px rgba(0,0,0,0.2);
            backface-visibility: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
        }

        .page.flipped {
            transform: rotateY(-180deg);
        }

        .page-content {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .page-footer {
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 10px;
            font-family: system-ui;
        }

        .ui-layer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            z-index: 20;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .ui-hidden {
            transform: translateY(100%);
        }

        .permission-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #38bdf8;
        }

        .nav-btn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 20px 10px;
            z-index: 15;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <canvas id="motion-canvas"></canvas>

    <div id="permission-screen" class="permission-overlay">
        <div class="mb-6 text-sky-400">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        </div>
        <h1 class="text-2xl font-bold mb-4">Reading Motion Relief</h1>
        <p class="text-slate-400 mb-8 max-w-xs">Enable sensors to sync the background horizon with your car's movement.</p>
        <button id="start-btn" class="bg-sky-500 hover:bg-sky-400 text-white font-bold py-4 px-8 rounded-full shadow-lg transition-all active:scale-95">
            Start Reading
        </button>
    </div>

    <!-- Navigation Areas -->
    <button onclick="prevPage()" class="nav-btn left-2">❮</button>
    <button onclick="nextPage()" class="nav-btn right-2">❯</button>

    <div class="book-container">
        <div id="book" class="book">
            <!-- Pages will be injected here -->
        </div>
    </div>

    <!-- UI Controls -->
    <div id="main-ui" class="ui-layer">
        <div class="p-6 max-w-lg mx-auto">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-sky-400">Settings</h3>
                <button id="hide-ui" class="text-xs opacity-50">Minimize</button>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Sensitivity</label>
                    <input type="range" id="sensitivity" min="0.1" max="5" step="0.1" value="1.5">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Dot Size</label>
                    <input type="range" id="dot-size" min="1" max="15" step="1" value="4">
                </div>
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Horizon Opacity</label>
                    <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="0.5">
                </div>
            </div>
        </div>
    </div>

    <button id="show-ui" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-30 bg-slate-800/80 px-4 py-2 rounded-full text-xs hidden">
        Show Settings
    </button>

    <script>
        const canvas = document.getElementById('motion-canvas');
        const ctx = canvas.getContext('2d');
        const book = document.getElementById('book');
        
        let state = {
            active: false,
            sensitivity: 1.5,
            dotSize: 4,
            opacity: 0.5,
            offsetX: 0,
            offsetY: 0,
            velX: 0,
            velY: 0,
            accelX: 0,
            accelY: 0,
            currentPage: 0
        };

        const bookContent = [
            { title: "Chapter 1: The Inertial Horizon", text: "Motion sickness happens when your eyes see a static page but your inner ear feels the car turning. By looking at these dots through the 'paper', your brain receives the missing visual motion cues." },
            { title: "Chapter 2: How to Read", text: "Keep your head as stable as possible. Let your peripheral vision track the moving dots. This app simulates a flip-book effect to make long-form reading more engaging and natural." },
            { title: "Chapter 3: The Physics", text: "We use the accelerometer to calculate acceleration forces. Instead of moving the text (which makes reading hard), we move the background. This creates the illusion that you are looking through a window at a stable world." },
            { title: "Chapter 4: Tips", text: "If you feel extremely nauseous, increase the 'Sensitivity' slider. This will make the background react more aggressively to the car's movements. You can also increase the dot size." },
            { title: "Chapter 5: Conclusion", text: "Technology can bridge the gap between our biological evolution and modern transportation. Enjoy your journey and your book, nausea-free." }
        ];

        function initBook() {
            book.innerHTML = '';
            bookContent.forEach((content, index) => {
                const page = document.createElement('div');
                page.className = 'page';
                page.style.zIndex = bookContent.length - index;
                page.innerHTML = `
                    <h2 class="text-xl font-bold mb-4 text-sky-700">${content.title}</h2>
                    <div class="page-content">${content.text}</div>
                    <div class="page-footer">Page ${index + 1} of ${bookContent.length}</div>
                `;
                book.appendChild(page);
            });
        }

        function nextPage() {
            const pages = document.querySelectorAll('.page');
            if (state.currentPage < pages.length - 1) {
                pages[state.currentPage].classList.add('flipped');
                state.currentPage++;
            }
        }

        function prevPage() {
            const pages = document.querySelectorAll('.page');
            if (state.currentPage > 0) {
                state.currentPage--;
                pages[state.currentPage].classList.remove('flipped');
            }
        }

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function handleMotion(event) {
            if (!state.active) return;
            const ax = event.accelerationIncludingGravity ? event.accelerationIncludingGravity.x : 0;
            const ay = event.accelerationIncludingGravity ? event.accelerationIncludingGravity.y : 0;
            state.accelX = -ax * 20 * state.sensitivity;
            state.accelY = ay * 20 * state.sensitivity;
        }

        function update() {
            state.velX += (state.accelX - state.offsetX) * 0.1;
            state.velY += (state.accelY - state.offsetY) * 0.1;
            state.velX *= 0.85;
            state.velY *= 0.85;
            state.offsetX += state.velX;
            state.offsetY += state.velY;

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = `rgba(56, 189, 248, ${state.opacity})`;
            
            const spacing = 70;
            const w = canvas.width;
            const h = canvas.height;

            for (let x = -spacing; x < w + spacing; x += spacing) {
                for (let y = -spacing; y < h + spacing; y += spacing) {
                    let dx = (x + state.offsetX) % (w + spacing);
                    let dy = (y + state.offsetY) % (h + spacing);
                    if (dx < 0) dx += (w + spacing);
                    if (dy < 0) dy += (h + spacing);
                    
                    ctx.beginPath();
                    ctx.arc(dx, dy, state.dotSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Start Logic
        document.getElementById('start-btn').addEventListener('click', async () => {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                const res = await DeviceMotionEvent.requestPermission();
                if (res === 'granted') start();
            } else {
                start();
            }
        });

        function start() {
            state.active = true;
            document.getElementById('permission-screen').style.display = 'none';
            window.addEventListener('devicemotion', handleMotion);
            initBook();
            initCanvas();
            update();
        }

        // UI Handlers
        document.getElementById('hide-ui').onclick = () => {
            document.getElementById('main-ui').classList.add('ui-hidden');
            document.getElementById('show-ui').classList.remove('hidden');
        };
        document.getElementById('show-ui').onclick = () => {
            document.getElementById('main-ui').classList.remove('ui-hidden');
            document.getElementById('show-ui').classList.add('hidden');
        };
        document.getElementById('sensitivity').oninput = (e) => state.sensitivity = e.target.value;
        document.getElementById('dot-size').oninput = (e) => state.dotSize = e.target.value;
        document.getElementById('opacity').oninput = (e) => state.opacity = e.target.value;

        window.addEventListener('resize', initCanvas);
    </script>
</body>
</html>
