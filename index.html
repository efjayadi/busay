<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BusayBook ʕ•ᴥ•ʔ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <!-- Tenor Embed Script -->
    <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    <style>
        :root {
            --primary: #ffb7b2;
            --accent: #ff9aa2;
            --bg-app: #ffffff;
            --bear-brown: #6d4c41;
            --text-main: #4a3728;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-app);
            font-family: 'Quicksand', sans-serif;
            touch-action: none;
            color: var(--text-main);
        }

        #motion-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 3D Book Styles */
        .book-container {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            height: 75vh;
            max-width: 500px;
            perspective: 2000px;
            z-index: 10;
            display: none;
        }

        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: rgba(255, 255, 255, 0.98);
            color: var(--text-main);
            box-sizing: border-box;
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.15, 0, 0.15, 1);
            border-radius: 4px 12px 12px 4px;
            box-shadow: 
                inset 8px 0 15px rgba(0,0,0,0.03),
                5px 5px 20px rgba(0,0,0,0.1);
            backface-visibility: hidden;
            border: 1px solid #eee;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .page canvas {
            width: 100% !important;
            height: auto !important;
            display: block;
        }

        .page.flipped {
            transform: rotateY(-170deg) scale(0.95);
            opacity: 0;
            pointer-events: none;
        }

        /* Bottom Sheet UI */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 40px 40px 0 0;
            padding: 24px;
            z-index: 30;
            box-shadow: 0 -10px 30px rgba(109, 76, 65, 0.1);
            transform: translateY(calc(100% - 70px));
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            border-top: 5px solid var(--primary);
            display: none;
        }

        .bottom-sheet.open {
            transform: translateY(0);
        }

        .drag-handle {
            width: 50px;
            height: 6px;
            background: #f0e4d7;
            border-radius: 10px;
            margin: 0 auto 20px auto;
        }

        .permission-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #ffffff !important; /* Force white */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .bubbly-btn {
            background: var(--primary);
            color: white;
            font-weight: bold;
            padding: 16px 40px;
            border-radius: 30px;
            box-shadow: 0 8px 0 #ff938a;
            transition: all 0.1s;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .bubbly-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #ff938a;
        }

        /* GIF Styling - Fixed for initial "grey" issue */
        .gif-wrapper {
            width: 220px;
            min-height: 220px; /* Prevent collapse */
            margin-bottom: 10px;
            pointer-events: none;
            background-color: #ffffff !important;
        }

        /* Override Tenor default grey/black placeholder */
        .tenor-gif-embed {
            background-color: #ffffff !important;
        }
        
        .tenor-gif-embed iframe {
            background-color: #ffffff !important;
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        input[type="range"] {
            width: 100%;
            height: 12px;
            background: #fdf2f2;
            border-radius: 10px;
            appearance: none;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid white;
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-pink-400 mb-4"></div>
        <p class="font-bold text-pink-400">Bubu is preparing your book...</p>
    </div>

    <canvas id="motion-canvas"></canvas>

    <div id="permission-screen" class="permission-screen">
        <!-- Seamless Bubu GIF with forced white background -->
        <div class="gif-wrapper">
            <div class="tenor-gif-embed" data-postid="25251841" data-share-method="host" data-aspect-ratio="1" data-width="100%">
                <a href="https://tenor.com/view/tkthao219-bubududu-peach-goma-gif-25251841">Tkthao219 Bubududu Sticker</a>
            </div>
        </div>
        
        <h1 class="text-4xl font-bold mb-2 text-[#4a3728]" style="font-family: 'Gaegu', cursive;">BusayBook</h1>
        <p class="text-slate-500 mb-8 max-w-xs font-medium">Ready for a comfortable trip? ʕ•ᴥ•ʔ</p>
        
        <label for="pdf-upload" class="bubbly-btn text-xl cursor-pointer">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            CHOOSE YOUR PDF
        </label>
        <input type="file" id="pdf-upload" accept="application/pdf" class="hidden">
    </div>

    <!-- Interaction Zones -->
    <div onclick="prevPage()" class="fixed left-0 top-0 w-1/4 h-3/4 z-15"></div>
    <div onclick="nextPage()" class="fixed right-0 top-0 w-1/4 h-3/4 z-15"></div>

    <div id="book-container" class="book-container">
        <div id="book" class="book"></div>
    </div>

    <!-- Bottom Sheet -->
    <div id="bottom-sheet" class="bottom-sheet">
        <div class="drag-handle" onclick="toggleSheet()"></div>
        
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center">
                <div class="w-3 h-3 bg-green-400 rounded-full mr-2 shadow-[0_0_8px_rgba(74,222,128,0.5)]"></div>
                <span class="text-xs font-bold tracking-widest text-slate-400 uppercase">System Active</span>
            </div>
            <button id="mode-toggle" class="text-xs font-bold bg-[#fff5f5] px-4 py-2 rounded-full text-[#ff9aa2] border-2 border-[#ff9aa2]">HEART GRID</button>
        </div>

        <div class="space-y-8">
            <div>
                <div class="flex justify-between text-sm mb-3">
                    <span class="text-slate-500 font-bold">Bear Sensitivity</span>
                    <span id="sense-val" class="text-[#ff9aa2] font-bold">1.5x</span>
                </div>
                <input type="range" id="sensitivity" min="0.5" max="4" step="0.1" value="1.5">
            </div>

            <div>
                <div class="flex justify-between text-sm mb-3">
                    <span class="text-slate-500 font-bold">Dot Size</span>
                    <span id="density-val" class="text-[#ff9aa2] font-bold">Squishy</span>
                </div>
                <input type="range" id="dot-size" min="3" max="20" step="1" value="8">
            </div>

            <div>
                <div class="flex justify-between text-sm mb-3">
                    <span class="text-slate-500 font-bold">Visibility</span>
                    <span id="opacity-val" class="text-[#ff9aa2] font-bold">40%</span>
                </div>
                <input type="range" id="opacity" min="0.1" max="0.8" step="0.1" value="0.4">
            </div>
        </div>
        
        <div class="mt-8 pt-4 text-center">
            <p class="text-[12px] text-[#d4a373] font-bold">Busay's Happy Reading Space ʕ •ᴥ•ʔ</p>
        </div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        const canvas = document.getElementById('motion-canvas');
        const ctx = canvas.getContext('2d');
        const book = document.getElementById('book');
        const sheet = document.getElementById('bottom-sheet');
        const pdfUpload = document.getElementById('pdf-upload');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        let state = {
            active: false,
            sensitivity: 1.5,
            dotSize: 8,
            opacity: 0.4,
            mode: 'dots',
            targetX: 0,
            targetY: 0,
            currentX: 0,
            currentY: 0,
            lerpFactor: 0.1, 
            currentPage: 0,
            totalPages: 0
        };

        async function handlePdfUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            loadingOverlay.style.display = 'flex';
            
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            state.totalPages = pdf.numPages;
            
            book.innerHTML = '';
            
            // Render first 50 pages
            const pagesToRender = Math.min(state.totalPages, 50);
            
            for (let i = 1; i <= pagesToRender; i++) {
                const pdfPage = await pdf.getPage(i);
                const viewport = pdfPage.getViewport({ scale: 1.5 });
                
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.style.zIndex = state.totalPages - i;
                
                const pageCanvas = document.createElement('canvas');
                const context = pageCanvas.getContext('2d');
                pageCanvas.height = viewport.height;
                pageCanvas.width = viewport.width;
                
                await pdfPage.render({ canvasContext: context, viewport: viewport }).promise;
                
                pageDiv.appendChild(pageCanvas);
                
                const num = document.createElement('div');
                num.className = 'absolute bottom-2 left-0 right-0 text-center text-[8px] font-bold text-slate-400';
                num.innerText = `PAGE ${i}`;
                pageDiv.appendChild(num);
                
                book.appendChild(pageDiv);
            }

            loadingOverlay.style.display = 'none';
            startApp();
        }

        function startApp() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(res => {
                    if (res === 'granted') initSensors();
                });
            } else {
                initSensors();
            }
        }

        function initSensors() {
            state.active = true;
            document.getElementById('permission-screen').style.display = 'none';
            document.getElementById('book-container').style.display = 'block';
            sheet.style.display = 'block';
            
            window.addEventListener('devicemotion', (event) => {
                const rawX = event.accelerationIncludingGravity ? event.accelerationIncludingGravity.x : 0;
                const rawY = event.accelerationIncludingGravity ? event.accelerationIncludingGravity.y : 0;
                state.targetX = -rawX * 45 * state.sensitivity;
                state.targetY = rawY * 45 * state.sensitivity;
            });

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            update();
        }

        function toggleSheet() {
            sheet.classList.toggle('open');
        }

        function nextPage() {
            const pages = document.querySelectorAll('.page');
            if (state.currentPage < pages.length - 1) {
                pages[state.currentPage].classList.add('flipped');
                state.currentPage++;
            }
        }

        function prevPage() {
            const pages = document.querySelectorAll('.page');
            if (state.currentPage > 0) {
                state.currentPage--;
                pages[state.currentPage].classList.remove('flipped');
            }
        }

        function update() {
            state.currentX += (state.targetX - state.currentX) * state.lerpFactor;
            state.currentY += (state.targetY - state.currentY) * state.lerpFactor;
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = `rgba(255, 183, 178, ${state.opacity})`;
            
            const spacing = 70;
            const w = canvas.width;
            const h = canvas.height;

            if (state.mode === 'dots') {
                for (let x = -spacing; x < w + spacing; x += spacing) {
                    for (let y = -spacing; y < h + spacing; y += spacing) {
                        let dx = (x + state.currentX) % (w + spacing);
                        let dy = (y + state.currentY) % (h + spacing);
                        if (dx < 0) dx += (w + spacing);
                        if (dy < 0) dy += (h + spacing);
                        ctx.beginPath();
                        ctx.arc(dx, dy, state.dotSize / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            } else {
                ctx.font = `${state.dotSize * 2}px serif`;
                for (let x = -spacing; x < w + spacing; x += spacing) {
                    for (let y = -spacing; y < h + spacing; y += spacing) {
                        let dx = (x + state.currentX) % (w + spacing);
                        let dy = (y + state.currentY) % (h + spacing);
                        if (dx < 0) dx += (w + spacing);
                        if (dy < 0) dy += (h + spacing);
                        ctx.fillText('❤', dx - state.dotSize, dy + state.dotSize);
                    }
                }
            }
        }

        pdfUpload.addEventListener('change', handlePdfUpload);

        document.getElementById('sensitivity').oninput = (e) => {
            state.sensitivity = parseFloat(e.target.value);
            document.getElementById('sense-val').innerText = state.sensitivity.toFixed(1) + 'x';
        };
        document.getElementById('dot-size').oninput = (e) => {
            state.dotSize = parseInt(e.target.value);
            document.getElementById('density-val').innerText = state.dotSize > 12 ? 'Big' : 'Squishy';
        };
        document.getElementById('opacity').oninput = (e) => {
            state.opacity = parseFloat(e.target.value);
            document.getElementById('opacity-val').innerText = Math.round(state.opacity * 100) + '%';
        };
        document.getElementById('mode-toggle').onclick = (e) => {
            state.mode = state.mode === 'dots' ? 'hearts' : 'dots';
            e.target.innerText = state.mode === 'dots' ? 'HEART GRID' : 'DOT MODE';
        };

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
